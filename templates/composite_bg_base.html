<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>{% block page_title %}Фон{% endblock %} — {{ tournament_name }}</title>
    <link rel="stylesheet" href="/static/css/composite_bg_shared.css">
    <link rel="stylesheet" href="/static/css/{% block slot_css %}{% endblock %}">
</head>
<body>
    <div class="composite-bg">
        <div class="header">
            <div class="tournament-name {{ name_class }}">{{ tournament_name }}</div>
            <div class="logos">
                {% block logos %}
                <div class="logo logo3" style="background-image: url('/static/images/logo3.png');"></div>
                <div class="logo logo2" style="background-image: url('/static/images/logo2.png');"></div>
                <div class="logo logo1" style="background-image: url('/static/images/logo1.png');"></div>
                {% endblock %}
            </div>
        </div>
        <div class="header-line"></div>
        {% block olimpic_labels %}{% endblock %}
    </div>
</body>
</html>
